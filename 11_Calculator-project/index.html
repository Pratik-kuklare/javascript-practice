<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="calculator-container">
            <div class="display-box">
        <p class="js-calculation calculation"></p>
            </div>
        <button onclick="
            calculation = '';
            displayCalculation();
            localStorage.setItem('calculation', calculation)"
            class="clear-button calculator-button">
            C
        </button>

        <button onclick="
            updateCalculation(' % ')"
            class="operations-button calculator-button">
            %
        </button>

        <button onclick="
             updateCalculation(' / ')"
            class="operations-button calculator-button">
            ÷
        </button>

        <button onclick="
            updateCalculation(' * ')"
            class="operations-button calculator-button">
            x
        </button> <br> <br>

        <button onclick="
            updateCalculation('7')"
            class="numbers-button calculator-button">
            7
        </button>

        <button onclick="
             updateCalculation('8')"
            class="numbers-button calculator-button">
            8
        </button>

        <button onclick="
             updateCalculation('9')"
            class="numbers-button calculator-button">
            9
        </button>

        <button onclick="
             updateCalculation(' - ')"
            class="operations-button calculator-button">
            −
        </button> <br> <br>

        <button onclick="
             updateCalculation('4')"
            class="numbers-button calculator-button">
            4
        </button>

        <button onclick="
             updateCalculation('5')"
            class="numbers-button calculator-button">
            5
        </button>

        <button onclick="
             updateCalculation('6')"
            class="numbers-button calculator-button">
            6
        </button>

        <button onclick="
             updateCalculation(' + ')"
            class="operations-button calculator-button">
            +
        </button> <br> <br>

        <button onclick="
             updateCalculation('1')"
            class="numbers-button calculator-button">
            1
        </button>

        <button onclick="
             updateCalculation('2')"
            class="numbers-button calculator-button">
            2
        </button>

        <button onclick="
            updateCalculation('3')"
            class="numbers-button calculator-button">
            3
        </button>

        <button onclick="
            calculation = eval(calculation);
            displayCalculation();"
            class="equal-to-button calculator-button">
            =
        </button> <br><br>

        <button onclick="
            updateCalculation('0')"
            class="zero-button calculator-button">
            0  
        </button>

        <button onclick="
            updateCalculation('.')"
            class="numbers-button calculator-button">
            .
        </button>

        <button onclick="
            deletelast()"
            class="delete-button calculator-button">
            ⌫
        </button>
        </div>

        <script src="javascript.js"></script>
    </body>
</html>
